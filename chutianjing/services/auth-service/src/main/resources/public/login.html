<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>登录</title>
	<style>
		:root { --bg: #0f172a; --card: #111827; --text: #e5e7eb; --muted: #9ca3af; --primary: #2563eb; --primary-600: #1d4ed8; --danger: #ef4444; --success: #10b981; }
		* { box-sizing: border-box; }
		html, body { height: 100%; }
		body {
			margin: 0; display: grid; place-items: center; background: linear-gradient(135deg, #0f172a, #111827);
			font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
			color: var(--text);
		}
		.card {
			width: 100%; max-width: 360px; background: rgba(17, 24, 39, 0.85); border: 1px solid rgba(255,255,255,0.06);
			border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
			backdrop-filter: blur(6px);
		}
		.header { text-align: center; margin-bottom: 18px; }
		.header h1 { margin: 0 0 6px; font-size: 20px; font-weight: 700; }
		.header p { margin: 0; font-size: 13px; color: var(--muted); }
		.field { margin: 12px 0; }
		.label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
		.input {
			width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
			background: rgba(255,255,255,0.04); color: var(--text); font-size: 14px; outline: none;
		}
		.input:focus { border-color: rgba(37, 99, 235, 0.7); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
		.button {
			width: 100%; margin-top: 14px; padding: 10px 14px; border: 0; border-radius: 10px;
			background: linear-gradient(180deg, var(--primary), var(--primary-600)); color: white; font-weight: 600; font-size: 14px; cursor: pointer;
		}
		.button:hover { filter: brightness(1.05); }
		.meta { margin-top: 10px; font-size: 12px; color: var(--muted); text-align: center; }
		.alert { margin: 10px 0 0; font-size: 13px; padding: 10px 12px; border-radius: 10px; display: none; }
		.alert.error { background: rgba(239, 68, 68, 0.1); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.35); }
		.alert.success { background: rgba(16, 185, 129, 0.1); color: #bbf7d0; border: 1px solid rgba(16, 185, 129, 0.35); }
	</style>
</head>
<body>
	<div class="card">
		<div class="header">
			<h1>欢迎登录</h1>
			<p>请输入账号和密码</p>
		</div>

		<div id="errorMsg" class="alert error">用户名或密码错误，请重试。</div>
		<div id="logoutMsg" class="alert success">您已安全退出，请重新登录。</div>

		<form method="post" action="/login">
			<div class="field">
				<label class="label" for="username">用户名</label>
				<input class="input" id="username" name="username" type="text" autocomplete="username" required />
			</div>
			<div class="field">
				<label class="label" for="password">密码</label>
				<input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
			</div>
			<button class="button" type="submit">登录</button>
		</form>

		<div class="meta">默认开发账号：hbctj1995 / code123</div>
	</div>

	<script>
		(function() {
			var params = new URLSearchParams(window.location.search);
			document.getElementById('errorMsg').style.display = params.has('error') ? 'block' : 'none';
			document.getElementById('logoutMsg').style.display = params.has('logout') ? 'block' : 'none';
		})();
	</script>
</body>
</html>
